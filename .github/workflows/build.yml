name: Build (macOS + Windows + Linux)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Windows runtime (static CRT)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          "RUSTFLAGS=-C target-feature=+crt-static" >> $env:GITHUB_ENV

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: Install Windows bundling tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory | Where-Object Name -like "WiX Toolset v3*" | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $wixRoot) {
            throw "WiX Toolset installation folder was not found."
          }
          $wixBin = Join-Path $wixRoot.FullName "bin"
          "WIX=$wixBin" >> $env:GITHUB_ENV
          "$wixBin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows installer (MSI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name }}"
          $version = $tag.TrimStart("v", "V")
          if ($version -notmatch "^\d+\.\d+\.\d+(\.\d+)?$") {
            $version = "0.1.0.0"
          } elseif ($version -match "^\d+\.\d+\.\d+$") {
            $version = "$version.0"
          }

          New-Item -ItemType Directory -Force installer | Out-Null
          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
            <Product
              Id="*"
              Name="Autosample"
              Language="1033"
              Version="$version"
              Manufacturer="Autosample Team"
              UpgradeCode="B218DD76-F0E0-4E68-A0D2-A9F0277C2F0D">
              <Package InstallerVersion="500" Compressed="yes" InstallScope="perMachine" />
              <MajorUpgrade DowngradeErrorMessage="A newer version of Autosample is already installed." />
              <MediaTemplate EmbedCab="yes" />

              <Feature Id="MainFeature" Title="Autosample" Level="1">
                <ComponentGroupRef Id="AutosampleBinaries" />
              </Feature>

              <UIRef Id="WixUI_Minimal" />
              <Property Id="WIXUI_INSTALLDIR" Value="INSTALLDIR" />
            </Product>

            <Fragment>
              <Directory Id="TARGETDIR" Name="SourceDir">
                <Directory Id="ProgramFiles64Folder">
                  <Directory Id="INSTALLDIR" Name="Autosample" />
                </Directory>
              </Directory>
            </Fragment>

            <Fragment>
              <ComponentGroup Id="AutosampleBinaries" Directory="INSTALLDIR">
                <Component Id="AutosampleGuiExe" Guid="*">
                  <File Id="AutosampleGuiFile" Source="target\release\autosample-gui.exe" KeyPath="yes" />
                </Component>
                <Component Id="AutosampleCliExe" Guid="*">
                  <File Id="AutosampleCliFile" Source="target\release\autosample.exe" KeyPath="yes" />
                </Component>
              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          Set-Content -Path installer\autosample.wxs -Value $wxs -Encoding UTF8
          candle.exe -arch x64 installer\autosample.wxs -out installer\
          light.exe -ext WixUIExtension -cultures:en-us installer\autosample.wixobj -o autosample-Windows.msi

      - name: Prepare artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui
          (cd dist && zip -r "../autosample-macOS.zip" .)

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\autosample.exe dist\autosample.exe
          Copy-Item target\release\autosample-gui.exe dist\autosample-gui.exe
          Compress-Archive -Path dist\* -DestinationPath autosample-Windows.zip -Force

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui
          (cd dist && zip -r "../autosample-Linux.zip" .)

      - name: Upload build archive
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-${{ runner.os }}
          path: autosample-${{ runner.os }}.zip

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-${{ runner.os }}
          path: |
            autosample-Windows.zip
            autosample-Windows.msi

  release-assets:
    name: Attach assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build archives
        uses: actions/download-artifact@v4
        with:
          pattern: autosample-*
          merge-multiple: true
          path: release-assets

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.zip
            release-assets/*.msi
