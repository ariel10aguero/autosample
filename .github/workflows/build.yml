name: Build (macOS + Windows + Linux)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Linux system dependencies
      # -----------------------------------------------------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      # -----------------------------------------------------------------------
      # Rust toolchain
      # -----------------------------------------------------------------------
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS cross-compilation targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      # -----------------------------------------------------------------------
      # Caching
      # -----------------------------------------------------------------------
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      # -----------------------------------------------------------------------
      # Build — Linux / Windows (native)
      # -----------------------------------------------------------------------
      - name: Build workspace (release)
        if: runner.os != 'macOS'
        run: cargo build --release --workspace

      # -----------------------------------------------------------------------
      # Build — macOS universal binary
      # Two explicit target passes then lipo merges them.
      # MACOSX_DEPLOYMENT_TARGET is set per-step to avoid mismatched
      # LC_VERSION_MIN_MACOSX load commands between the two slices.
      # -----------------------------------------------------------------------
      - name: Build macOS x86_64
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "10.15"
        run: cargo build --release --workspace --target x86_64-apple-darwin

      - name: Build macOS aarch64
        if: runner.os == 'macOS'
        env:
          MACOSX_DEPLOYMENT_TARGET: "11.0"
        run: cargo build --release --workspace --target aarch64-apple-darwin

      - name: Verify macOS build outputs
        if: runner.os == 'macOS'
        run: |
          echo "=== x86_64 ==="
          file target/x86_64-apple-darwin/release/autosample
          file target/x86_64-apple-darwin/release/autosample-gui

          echo "=== aarch64 ==="
          file target/aarch64-apple-darwin/release/autosample
          file target/aarch64-apple-darwin/release/autosample-gui

      - name: Create macOS universal binaries
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist

          lipo -create \
            target/x86_64-apple-darwin/release/autosample \
            target/aarch64-apple-darwin/release/autosample \
            -output dist/autosample

          lipo -create \
            target/x86_64-apple-darwin/release/autosample-gui \
            target/aarch64-apple-darwin/release/autosample-gui \
            -output dist/autosample-gui

          chmod +x dist/autosample dist/autosample-gui

          echo "=== Universal binary verification ==="
          lipo -info dist/autosample
          lipo -info dist/autosample-gui

      - name: Package macOS artifacts
        if: runner.os == 'macOS'
        run: |
          cd dist && zip -r "../autosample-macOS.zip" .
          ls -lh ../autosample-macOS.zip

      # -----------------------------------------------------------------------
      # Windows — WiX v3 MSI installer
      # -----------------------------------------------------------------------
      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y

          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory |
            Where-Object { $_.Name -like "WiX Toolset v3*" } |
            Sort-Object Name -Descending |
            Select-Object -First 1

          if (-not $wixRoot) {
            throw "WiX Toolset v3 not found under Program Files (x86)."
          }

          $wixBin = Join-Path $wixRoot.FullName "bin"
          Write-Host "WiX bin: $wixBin"

          "WIX=$wixBin" | Out-File -FilePath $env:GITHUB_ENV  -Encoding utf8 -Append
          "$wixBin"     | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows MSI
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # ── version string ────────────────────────────────────────────
          $tag     = "${{ github.event.release.tag_name }}"
          $version = $tag -replace '^[vV]', ''
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            $version = "0.1.0.0"
          } elseif ($version -match '^\d+\.\d+\.\d+$') {
            $version = "$version.0"
          }
          Write-Host "MSI product version: $version"

          # ── stage payload ─────────────────────────────────────────────
          $payloadDir = "$PWD\installer\payload"
          New-Item -ItemType Directory -Force $payloadDir | Out-Null

          Copy-Item target\release\autosample-gui.exe "$payloadDir\" -Force
          Copy-Item target\release\autosample.exe     "$payloadDir\" -Force

          Get-ChildItem target\release\*.dll -ErrorAction SilentlyContinue |
            ForEach-Object { Copy-Item $_.FullName "$payloadDir\" -Force }

          Write-Host "Payload contents:"
          Get-ChildItem $payloadDir | Select-Object Name, Length

          # ── WXS source ────────────────────────────────────────────────
          # Icon SourceFile uses $(var.PayloadDir) — the backtick before $
          # prevents PowerShell from expanding it; WiX expands it instead.
          $wxs = @"
<?xml version="1.0" encoding="UTF-8"?>
<Wix xmlns="http://schemas.microsoft.com/wix/2006/wi">
  <Product
    Id="*"
    Name="Autosample"
    Language="1033"
    Version="$version"
    Manufacturer="Autosample Team"
    UpgradeCode="B218DD76-F0E0-4E68-A0D2-A9F0277C2F0D">
    <Package
      InstallerVersion="500"
      Compressed="yes"
      InstallScope="perMachine" />
    <MajorUpgrade
      DowngradeErrorMessage="A newer version of Autosample is already installed." />
    <MediaTemplate EmbedCab="yes" />

    <Icon Id="AutosampleIcon"
          SourceFile="`$(var.PayloadDir)\autosample-gui.exe" />
    <Property Id="ARPPRODUCTICON" Value="AutosampleIcon" />

    <Feature Id="MainFeature" Title="Autosample" Level="1">
      <ComponentGroupRef Id="PayloadFiles" />
      <ComponentGroupRef Id="ShortcutComponents" />
    </Feature>

    <UIRef Id="WixUI_Minimal" />
    <Property Id="WIXUI_INSTALLDIR" Value="INSTALLDIR" />
  </Product>

  <Fragment>
    <Directory Id="TARGETDIR" Name="SourceDir">
      <Directory Id="ProgramFiles64Folder">
        <Directory Id="INSTALLDIR" Name="Autosample" />
      </Directory>
      <Directory Id="DesktopFolder" Name="Desktop" />
    </Directory>
  </Fragment>

  <Fragment>
    <ComponentGroup Id="ShortcutComponents" Directory="INSTALLDIR">
      <Component Id="DesktopShortcutComp" Guid="*">
        <Shortcut
          Id="DesktopShortcut"
          Directory="DesktopFolder"
          Name="Autosample"
          Description="Launch Autosample GUI"
          WorkingDirectory="INSTALLDIR"
          Icon="AutosampleIcon"
          IconIndex="0"
          Target="[INSTALLDIR]autosample-gui.exe" />
        <RegistryValue
          Root="HKCU"
          Key="Software\Autosample"
          Name="DesktopShortcut"
          Type="integer"
          Value="1"
          KeyPath="yes" />
      </Component>
    </ComponentGroup>
  </Fragment>
</Wix>
"@

          Set-Content -Path installer\autosample.wxs -Value $wxs -Encoding UTF8

          # ── WiX pipeline ──────────────────────────────────────────────
          Write-Host "heat..."
          heat.exe dir "$payloadDir" `
            -cg PayloadFiles `
            -dr INSTALLDIR `
            -gg -scom -sreg -sfrag -srd `
            -var var.PayloadDir `
            -out installer\payload.wxs
          if ($LASTEXITCODE -ne 0) { throw "heat failed (exit $LASTEXITCODE)" }

          Write-Host "Generated payload.wxs:"
          Get-Content installer\payload.wxs

          Write-Host "candle..."
          candle.exe `
            -arch x64 `
            "-dPayloadDir=$payloadDir" `
            installer\autosample.wxs `
            installer\payload.wxs `
            -out installer\
          if ($LASTEXITCODE -ne 0) { throw "candle failed (exit $LASTEXITCODE)" }

          Write-Host "light..."
          light.exe `
            -ext WixUIExtension `
            -cultures:en-us `
            "-dPayloadDir=$payloadDir" `
            installer\autosample.wixobj `
            installer\payload.wixobj `
            -o autosample-Windows.msi
          if ($LASTEXITCODE -ne 0) { throw "light failed (exit $LASTEXITCODE)" }

          Write-Host "MSI ready:"
          Get-Item autosample-Windows.msi | Select-Object Name, Length

      # -----------------------------------------------------------------------
      # Windows ZIP (portable, no installer)
      # -----------------------------------------------------------------------
      - name: Package Windows artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\autosample.exe     dist\
          Copy-Item target\release\autosample-gui.exe dist\
          Compress-Archive -Path dist\* -DestinationPath autosample-Windows.zip -Force

      # -----------------------------------------------------------------------
      # Linux ZIP
      # -----------------------------------------------------------------------
      - name: Package Linux artifacts
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample     dist/
          cp target/release/autosample-gui dist/
          chmod +x dist/autosample dist/autosample-gui
          cd dist && zip -r "../autosample-Linux.zip" .

      # -----------------------------------------------------------------------
      # Upload artifacts for the release-assets job
      # -----------------------------------------------------------------------
      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-macOS
          path: autosample-macOS.zip

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Linux
          path: autosample-Linux.zip

      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Windows
          path: |
            autosample-Windows.zip
            autosample-Windows.msi

  # ---------------------------------------------------------------------------
  # Attach everything to the GitHub Release
  # ---------------------------------------------------------------------------
  release-assets:
    name: Attach assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: autosample-*
          merge-multiple: true
          path: release-assets

      - name: List release assets
        run: ls -lh release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.zip
            release-assets/*.msi