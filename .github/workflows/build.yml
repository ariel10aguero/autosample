name: Build (macOS + Windows + Linux)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Linux deps ───────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libssl-dev

      # ─── macOS deps ───────────────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$(xcrun --show-sdk-path)" \
            >> $GITHUB_ENV

      # ─── Rust toolchain ───────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Universal targets
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # ─── Build ────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --workspace

      - name: Build (Windows - static CRT)
        if: runner.os == 'Windows'
        shell: pwsh
        # crt-static is set in .cargo/config.toml
        run: cargo build --release --workspace

      - name: Build macOS x86_64
        if: runner.os == 'macOS'
        run: cargo build --release --workspace --target x86_64-apple-darwin

      - name: Build macOS aarch64
        if: runner.os == 'macOS'
        run: cargo build --release --workspace --target aarch64-apple-darwin

      - name: Create macOS Universal Binaries
        if: runner.os == 'macOS'
        run: |
          mkdir -p target/universal-apple-darwin/release
          lipo -create \
            target/x86_64-apple-darwin/release/autosample \
            target/aarch64-apple-darwin/release/autosample \
            -output target/universal-apple-darwin/release/autosample
          lipo -create \
            target/x86_64-apple-darwin/release/autosample_gui \
            target/aarch64-apple-darwin/release/autosample_gui \
            -output target/universal-apple-darwin/release/autosample_gui

      # ─── Package ──────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/universal-apple-darwin/release/autosample dist/
          APP_ROOT="dist/Autosample.app"
          mkdir -p "$APP_ROOT/Contents/MacOS" "$APP_ROOT/Contents/Resources"
          cp target/universal-apple-darwin/release/autosample_gui "$APP_ROOT/Contents/MacOS/Autosample"
          chmod +x "$APP_ROOT/Contents/MacOS/Autosample"
          cp autosample-gui/assets/logo.png "$APP_ROOT/Contents/Resources/logo.png"
          cat > "$APP_ROOT/Contents/Info.plist" <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
            <dict>
              <key>CFBundleName</key>
              <string>Autosample</string>
              <key>CFBundleDisplayName</key>
              <string>Autosample</string>
              <key>CFBundleIdentifier</key>
              <string>com.autosample.gui</string>
              <key>CFBundleVersion</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleShortVersionString</key>
              <string>${{ github.ref_name }}</string>
              <key>CFBundleExecutable</key>
              <string>Autosample</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>LSMinimumSystemVersion</key>
              <string>11.0</string>
              <key>NSMicrophoneUsageDescription</key>
              <string>Autosample needs microphone access to record audio from your selected input device.</string>
            </dict>
          </plist>
          EOF
          cd dist && zip -r "../autosample-macOS.zip" autosample Autosample.app

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/
          cp target/release/autosample_gui dist/autosample-gui
          cd dist && zip -r "../autosample-Linux.zip" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo install cargo-bundle --locked
          if (-not (Get-Command candle.exe -ErrorAction SilentlyContinue)) {
            choco install wixtoolset --no-progress -y
          }
          $wixBins = @(
            "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin",
            "${env:ProgramFiles(x86)}\WiX Toolset v3.11\bin"
          )
          foreach ($wixBin in $wixBins) {
            if (Test-Path $wixBin) {
              $wixBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            }
          }
          cargo bundle --release -p autosample-gui --format msi
          New-Item -ItemType Directory -Force dist | Out-Null
          New-Item -ItemType Directory -Force dist\autosample-cli | Out-Null
          Copy-Item target\release\bundle\msi\*.msi dist\autosample-Windows-installer.msi
          Copy-Item target\release\autosample.exe dist\autosample-cli\autosample.exe
          @'
          Autosample CLI (Windows)

          Example:
          autosample.exe --help
          '@ | Set-Content dist\autosample-cli\README.txt
          Compress-Archive -Path dist\autosample-cli\* -DestinationPath dist\autosample-Windows-cli.zip -Force

      # ─── Upload artifacts ─────────────────────────────────────
      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-macOS
          path: autosample-macOS.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Linux
          path: autosample-Linux.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Windows
          path: |
            dist\autosample-Windows-installer.msi
            dist\autosample-Windows-cli.zip

  # ─── Attach to GitHub Release ───────────────────────────────
  release-assets:
    name: Attach assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: autosample-*
          merge-multiple: true
          path: release-assets

      - name: List release assets (debug)
        run: ls -lah release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}