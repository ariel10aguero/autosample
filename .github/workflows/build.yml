name: Build (macOS + Windows + Linux)

on:
  push:
    branches: [ main, master ]
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: Prepare artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\autosample.exe dist\autosample.exe
          Copy-Item target\release\autosample-gui.exe dist\autosample-gui.exe

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autosample-${{ runner.os }}
          path: dist/*
