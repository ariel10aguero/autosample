name: Build (macOS + Windows + Linux)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build workspace (release)
        run: cargo build --release --workspace

      - name: Install Windows bundling tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress -y
          cargo install cargo-bundle --locked

      - name: Build Windows installer (MSI)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo bundle -p autosample-gui --release --format msi
          $msi = Get-ChildItem target\release\bundle\msi\*.msi | Select-Object -First 1
          if (-not $msi) {
            throw "MSI file was not generated."
          }
          Copy-Item $msi.FullName autosample-Windows.msi -Force

      - name: Prepare artifacts (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui
          (cd dist && zip -r "../autosample-macOS.zip" .)

      - name: Prepare artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\autosample.exe dist\autosample.exe
          Copy-Item target\release\autosample-gui.exe dist\autosample-gui.exe
          Compress-Archive -Path dist\* -DestinationPath autosample-Windows.zip -Force

      - name: Prepare artifacts (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/autosample
          cp target/release/autosample-gui dist/autosample-gui
          (cd dist && zip -r "../autosample-Linux.zip" .)

      - name: Upload build archive
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-${{ runner.os }}
          path: autosample-${{ runner.os }}.zip

      - name: Upload build artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-${{ runner.os }}
          path: |
            autosample-Windows.zip
            autosample-Windows.msi

  release-assets:
    name: Attach assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download build archives
        uses: actions/download-artifact@v4
        with:
          pattern: autosample-*
          merge-multiple: true
          path: release-assets

      - name: Upload archives to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            release-assets/*.zip
            release-assets/*.msi
