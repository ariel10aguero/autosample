name: Build (macOS + Windows + Linux)

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Linux deps ───────────────────────────────────────────
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libx11-dev \
            libxi-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libdbus-1-dev \
            libssl-dev

      # ─── macOS deps ───────────────────────────────────────────
      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm
          echo "LIBCLANG_PATH=$(brew --prefix llvm)/lib" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS=--sysroot=$(xcrun --show-sdk-path)" \
            >> $GITHUB_ENV

      # ─── Rust toolchain ───────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS Universal targets
        if: runner.os == 'macOS'
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      # ─── Build ────────────────────────────────────────────────
      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cargo build --release --workspace

      - name: Build (Windows - static CRT)
        if: runner.os == 'Windows'
        shell: pwsh
        # crt-static is set in .cargo/config.toml
        run: cargo build --release --workspace

      - name: Build macOS x86_64
        if: runner.os == 'macOS'
        run: cargo build --release --workspace --target x86_64-apple-darwin

      - name: Build macOS aarch64
        if: runner.os == 'macOS'
        run: cargo build --release --workspace --target aarch64-apple-darwin

      - name: Create macOS Universal Binaries
        if: runner.os == 'macOS'
        run: |
          mkdir -p target/universal-apple-darwin/release
          for bin in autosample autosample-gui; do
            lipo -create \
              target/x86_64-apple-darwin/release/$bin \
              target/aarch64-apple-darwin/release/$bin \
              -output target/universal-apple-darwin/release/$bin
          done

      # ─── Package ──────────────────────────────────────────────
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          cp target/universal-apple-darwin/release/autosample dist/
          cp target/universal-apple-darwin/release/autosample-gui dist/
          cd dist && zip -r "../autosample-macOS.zip" .

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/release/autosample dist/
          cp target/release/autosample-gui dist/
          cd dist && zip -r "../autosample-Linux.zip" .

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target\release\autosample.exe     dist\autosample.exe
          Copy-Item target\release\autosample-gui.exe dist\autosample-gui.exe
          .\autosample-gui\windows\build-msix.ps1 -Configuration Release
          Copy-Item autosample-gui\target\msix\*.msix dist\
          Compress-Archive -Path dist\* -DestinationPath autosample-Windows.zip -Force

      # ─── Upload artifacts ─────────────────────────────────────
      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-macOS
          path: autosample-macOS.zip

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Linux
          path: autosample-Linux.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: autosample-Windows
          path: |
            autosample-Windows.zip
            dist/*.msix

  # ─── Attach to GitHub Release ───────────────────────────────
  release-assets:
    name: Attach assets to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: autosample-*
          merge-multiple: true
          path: release-assets

      - name: List release assets (debug)
        run: ls -lah release-assets/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/*.zip
            release-assets/*.msix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}